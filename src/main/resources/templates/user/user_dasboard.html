<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">User Panel</span>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>
<div class="container mt-4">
    <div class="p-5 mb-4 bg-light rounded-3 border">
        <h1>Welcome, <span sec:authentication="name" class="text-primary">User</span>!</h1>
        <p class="lead">Welcome User Profile</p>
        <hr>
        <p>Role Assigned: <strong class="badge bg-info text-dark">USER</strong></p>
    </div>
</div>
</body>
</html>
