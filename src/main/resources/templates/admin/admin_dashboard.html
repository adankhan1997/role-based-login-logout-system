<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand font-weight-bold">Admin Console</span>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button class="btn btn-light-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>
<div class="container mt-4">
    <div class="card border-primary">
        <div class="card-body">
            <h1 class="card-title text-danger">Hello Admin: <span sec:authentication="name">Admin</span></h1>
            <p class="card-text">Welcome Admin Profile</p>
            <div class="alert alert-warning">
                <Strong>Notice:</Strong>
            </div>
        </div>
    </div>
</div>
</body>
</html>
